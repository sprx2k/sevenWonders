<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>7 Wonders of the World</title>
    <style>
        /* Sidebar Styling */
        .sidenav {
            height: 100%; /* Full-height */
            width: 0; /* 0 width - hidden by default */
            position: fixed; /* Stay in place */
            z-index: 1; /* Stay on top */
            top: 0;
            left: 0;
            background-color: rgba(0,0,0, 0.9); /* Black w/opacity */
            overflow-x: hidden; /* Disable horizontal scroll */
            padding-top: 60px; /* Place content 60px from the top */
            transition: 0.5s; /* 0.5 second transition effect to slide in the sidenav */
        }

        /* The navigation menu links */
        .sidenav a {
            padding: 8px 8px 8px 32px;
            text-decoration: none;
            font-size: 25px;
            color: #818181;
            display: block;
            transition: 0.3s;
        }

        /* When you mouse over the navigation links, change their color */
        .sidenav a:hover {
            color: #f1f1f1;
        }

        /* Position and style the close button (top right corner) */
        .sidenav .closebtn {
            position: absolute;
            top: 0;
            right: 25px;
            font-size: 36px;
            margin-left: 50px;
        }

        /* Style page content - use this if you want the rest of the page to move */
        #main {
            transition: margin-left .5s;
            padding: 20px;
        }

        /* Menu Icon Styling */
        .menu-trigger {
            font-size: 30px;
            cursor: pointer;
            padding: 10px;
            background: #eee;
            border-radius: 5px;
        }

        /* Responsive adjustments */
        @media screen and (max-height: 450px) {
            .sidenav {padding-top: 15px;}
            .sidenav a {font-size: 18px;}
        }
    </style>
</head>
<body>

<div id="sidebar" class="sidenav">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <a href="#home">Homepage</a>
    <a href="#chichen">Chichén Itzá</a>
    <a href="#christ">Christ the Redeemer</a>
    <a href="#china">Great Wall of China</a>
    <a href="#colosseum">The Colosseum</a>
    <a href="#machu">Machu Picchu</a>
    <a href="#petra">Petra</a>
    <a href="#taj">Taj Mahal</a>
</div>

<div id="main">
    <span class="menu-trigger" onclick="openNav()">&#9776; Menu</span>
    
    <h1>Seven New Wonders of the World</h1>
    <p>Click the menu to explore the wonders.</p>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/tkByLXlrr4o" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
</div>

<script>
    /* Set the width of the side navigation to 250px and the left margin of the page content to 250px */
    function openNav() {
        document.getElementById("sidebar").style.width = "250px";
        document.getElementById("main").style.marginLeft = "250px";
    }

    /* Set the width of the side navigation to 0 and the left margin of the page content to 0 */
    function closeNav() {
        document.getElementById("sidebar").style.width = "0";
        document.getElementById("main").style.marginLeft = "0";
    }
</script>

</body>
</html>
